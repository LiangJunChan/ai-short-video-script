server {
    listen       0.0.0.0:8080;
    server_name  _;

    # 前端静态文件
    location / {
        root   /home/admin/.openclaw/workspace/ai-short-video-script/frontend/dist;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://localhost:3000/uploads/;
        proxy_set_header Host $host;
    }

    # 缩略图代理
    location /thumbnails/ {
        proxy_pass http://localhost:3000/thumbnails/;
        proxy_set_header Host $host;
    }
}
